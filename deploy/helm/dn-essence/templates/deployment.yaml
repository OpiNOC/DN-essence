apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dn-essence.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dn-essence.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dn-essence.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dn-essence.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "dn-essence.fullname" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: COREDNS_NAMESPACE
              value: {{ .Values.coredns.namespace | quote }}
            - name: COREDNS_CONFIGMAP
              value: {{ .Values.coredns.configmap | quote }}
            - name: HTTP_ADDR
              value: ":{{ .Values.httpPort }}"
            - name: HEALTH_ADDR
              value: ":{{ .Values.healthPort }}"
          ports:
            - name: http
              containerPort: {{ .Values.httpPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.healthPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
